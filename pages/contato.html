<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Entre em contato com a TripWay e planeje a viagem dos seus sonhos." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Contato | TripWay</title>
  </head>
  <body>

    <nav>
      <div class="nav-inner">
        <a href="../index.html" class="nav-logo">Trip<span>Way</span></a>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="destinos.html">Destinos</a></li>
          <li><a href="pacotes.html">Pacotes</a></li>
          <li><a href="contato.html" class="ativo">Contato</a></li>
        </ul>
      </div>
    </nav>

    <header>
      <div class="header-pagina">
        <h1>Fale com a TripWay</h1>
        <p>Preencha o formulário e nossa equipe monta o pacote ideal para você. Resposta em até 24 horas.</p>
      </div>
    </header>

    <main>

      <section>

          <div class="contato-form-wrap">
            <form action="#" method="post">

              <div class="form-linha">
                <div class="form-grupo">
                  <label for="nome">Nome completo</label>
                  <input type="text" id="nome" name="nome" required placeholder="Ex: Maria Perez" autocomplete="name" />
                </div>
                <div class="form-grupo">
                  <label for="email">E-mail</label>
                  <input type="email" id="email" name="email" required placeholder="Ex: maria@email.com" autocomplete="email" />
                </div>
              </div>

              <div class="form-grupo">
                <label for="destino">Destino de interesse</label>
                <select id="destino" name="destino" required>
                  <option value="">Escolha seu destino</option>
                  <option value="las-vegas">Las Vegas — EUA</option>
                  <option value="miami">Miami — EUA</option>
                  <option value="suecia">Suécia — Europa</option>
                  <option value="ibiza">Ibiza — Espanha</option>
                  <option value="outro">Outro destino</option>
                </select>
              </div>

              <div class="form-linha">
                <div class="form-grupo">
                  <label for="adultos">Adultos</label>
                  <input type="number" id="adultos" name="adultos" required min="1" max="20" placeholder="Ex: 2" />
                </div>
                <div class="form-grupo">
                  <label for="criancas">Crianças</label>
                  <input type="number" id="criancas" name="criancas" min="0" max="10" placeholder="Ex: 1" />
                </div>
              </div>

              <div class="form-linha">
                <div class="form-grupo">
                  <label for="data-ida">Data de ida</label>
                  <input type="date" id="data-ida" name="data-ida" required />
                </div>
                <div class="form-grupo">
                  <label for="data-volta">Data de volta</label>
                  <input type="date" id="data-volta" name="data-volta" required />
                </div>
              </div>

              <div class="form-grupo">
                <label for="mensagem">Mensagem (opcional)</label>
                <textarea id="mensagem" name="mensagem" placeholder="Conte mais sobre o que você procura..."></textarea>
              </div>

              <div class="form-submit">
                <button type="submit" class="btn btn-primario" style="width: 100%; justify-content: center; padding: 0.9rem;">
                  Enviar solicitação
                </button>
              </div>

            </form>
          </div>

        </div>
      </section>

    </main>

    <footer>
      <div class="footer-inner">
        <div class="footer-topo">
          <div class="footer-logo">Trip<span>Way</span></div>
          <p class="footer-copy">TripWay &copy; 2026 — Todos os direitos reservados</p>
        </div>
      </div>
    </footer>

  </body>
</html>
